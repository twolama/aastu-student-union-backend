components:
  schemas:
    Announcement:
      type: object
      description: |-
        Serializer for announcements mapping JSONFields to frontend arrays and
        formatting relative/ISO time.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 255
        summary:
          type: string
        category:
          type: string
          format: uuid
          nullable: true
        category_details:
          allOf:
          - $ref: '#/components/schemas/AnnouncementCategory'
          readOnly: true
        is_pinned:
          type: boolean
          description: Pin to top of the list
        author:
          allOf:
          - $ref: '#/components/schemas/UserMinimal'
          readOnly: true
        author_name:
          type: string
          maxLength: 255
        author_role_name:
          type: string
          readOnly: true
        image:
          type: string
          format: uri
          nullable: true
        tags:
          type: array
          items:
            type: string
        body:
          type: string
          description: Rich text content (HTML)
        published_date:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - author
      - author_name
      - author_role_name
      - body
      - category_details
      - created_at
      - id
      - published_date
      - summary
      - title
      - updated_at
    AnnouncementCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
      required:
      - id
      - name
      - slug
    AnnouncementCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          minLength: 1
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
      required:
      - name
      - slug
    AnnouncementRequest:
      type: object
      description: |-
        Serializer for announcements mapping JSONFields to frontend arrays and
        formatting relative/ISO time.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        summary:
          type: string
          minLength: 1
        category:
          type: string
          format: uuid
          nullable: true
        is_pinned:
          type: boolean
          description: Pin to top of the list
        author_name:
          type: string
          minLength: 1
          maxLength: 255
        image:
          type: string
          format: binary
        tags:
          type: array
          items:
            type: string
        body:
          type: string
          minLength: 1
          description: Rich text content (HTML)
      required:
      - author_name
      - body
      - summary
      - title
    Booking:
      type: object
      description: |-
        Serializer for booking requests with expanded relational info.
        Includes requester and club details for admin views.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        id_label:
          type: string
          readOnly: true
        requester:
          allOf:
          - $ref: '#/components/schemas/UserMinimal'
          readOnly: true
        club:
