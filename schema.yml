components:
  schemas:
    AnalyticsBreakdownItem:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        value:
          type: integer
        color:
          type: string
      required:
      - color
      - id
      - label
      - value
    AnalyticsDashboardData:
      type: object
      properties:
        period:
          type: string
        overview:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsStatCard'
        registration_trends:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsTrendPoint'
        occupancy_trends:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsTrendPoint'
        club_breakdown:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsBreakdownItem'
        event_distribution:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsBreakdownItem'
        venue_kpis:
          $ref: '#/components/schemas/AnalyticsVenueKpi'
      required:
      - club_breakdown
      - event_distribution
      - occupancy_trends
      - overview
      - period
      - registration_trends
      - venue_kpis
    AnalyticsDashboardResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/AnalyticsDashboardData'
        statusCode:
          type: integer
        error:
          type: string
          nullable: true
      required:
      - data
      - error
      - message
      - statusCode
      - success
    AnalyticsStatCard:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        value:
          type: string
        trend:
          type: string
        trend_direction:
          $ref: '#/components/schemas/TrendDirectionEnum'
        icon:
          type: string
        icon_bg:
          type: string
      required:
      - icon
      - icon_bg
      - id
      - title
      - trend
      - trend_direction
      - value
    AnalyticsTrendPoint:
      type: object
      properties:
        label:
          type: string
        value:
          type: number
          format: double
      required:
      - label
      - value
    AnalyticsVenueKpi:
      type: object
      properties:
        most_popular:
          type: string
        avg_session_hours:
          type: number
          format: double
      required:
      - avg_session_hours
      - most_popular
    Announcement:
      type: object
      description: Alias for backward compatibility and internal creation.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 255
        body_excerpt:
          type: string
          readOnly: true
        category:
          type: string
          format: uuid
          nullable: true
        category_details:
          allOf:
          - $ref: '#/components/schemas/AnnouncementCategory'
          readOnly: true
        is_pinned:
          type: boolean
          description: Pin to top of the list
        author:
          allOf:
          - $ref: '#/components/schemas/UserMinimal'
          readOnly: true
        author_name:
          type: string
          maxLength: 255
        author_role_name:
          type: string
          readOnly: true
        image:
          type: string
          format: uri
          nullable: true
        tags:
          type: array
          items:
            type: string
        published_date:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        body:
          type: string
          description: Rich text content (HTML)
      required:
      - author
      - author_name
      - author_role_name
      - body
      - body_excerpt
      - category_details
      - created_at
      - id
      - published_date
      - title
      - updated_at
    AnnouncementCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
      required:
      - id
      - name
      - slug
    AnnouncementCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          minLength: 1
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
      required:
      - name
      - slug
    AnnouncementDetail:
      type: object
      description: |-
        Detailed serializer for single announcement view.
        Includes the full rich-text 'body'.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 255
        body_excerpt:
          type: string
          readOnly: true
        category:
          type: string
          format: uuid
          nullable: true
        category_details:
          allOf:
          - $ref: '#/components/schemas/AnnouncementCategory'
          readOnly: true
        is_pinned:
          type: boolean
          description: Pin to top of the list
        author:
          allOf:
          - $ref: '#/components/schemas/UserMinimal'
          readOnly: true
        author_name:
          type: string
          maxLength: 255
        author_role_name:
          type: string
          readOnly: true
        image:
          type: string
          format: uri
          nullable: true
        tags:
          type: array
          items:
            type: string
        published_date:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        body:
          type: string
          description: Rich text content (HTML)
      required:
      - author
      - author_name
      - author_role_name
      - body
