  /api/v1/announcements/:
    get:
      operationId: v1_announcements_list
      description: |-
        API endpoint that allows announcements to be viewed or edited.
        Includes searching by title/tags and categorization filters.
      parameters:
      - in: query
        name: author__username
        schema:
          type: string
      - in: query
        name: category__slug
        schema:
          type: string
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Announcements
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAnnouncementListList'
          description: ''
    post:
      operationId: v1_announcements_create
      description: |-
