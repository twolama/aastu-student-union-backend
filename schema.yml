          type: string
          readOnly: true
        venue_type:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/BookingStatusEnum'
        purpose:
          type: string
        requested_date_iso:
          type: string
          format: date-time
        time_range:
          type: string
          maxLength: 100
        capacity_label:
          type: string
          readOnly: true
        date_label:
          type: string
          readOnly: true
        event:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - capacity_label
      - club
      - created_at
      - date_label
      - event
      - id
      - id_label
      - purpose
      - requested_date_iso
      - requester
      - time_range
      - updated_at
      - venue
      - venue_name
      - venue_type
    BookingRequest:
