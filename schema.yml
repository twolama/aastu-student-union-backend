openapi: 3.0.3
info:
  title: AASTU Student Union API
  version: 1.0.0
  description: API documentation for the AASTU Student Union website backend.
paths:
  /api/v1/announcements/:
    get:
      operationId: v1_announcements_list
      description: |-
        API endpoint that allows announcements to be viewed or edited.
        Includes searching by title/tags and categorization filters.
      parameters:
      - in: query
        name: author_name
        schema:
          type: string
      - in: query
        name: category
        schema:
          type: string
          format: uuid
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Announcements
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAnnouncementList'
          description: ''
    post:
      operationId: v1_announcements_create
      description: |-
        API endpoint that allows announcements to be viewed or edited.
        Includes searching by title/tags and categorization filters.
      tags:
      - Announcements
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnouncementRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AnnouncementRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnnouncementRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Announcement'
          description: ''
  /api/v1/announcements/{id}/:
    get:
      operationId: v1_announcements_retrieve
      description: |-
