openapi: 3.0.3
info:
  title: AASTU Student Union API
  version: 1.0.0
  description: API documentation for the AASTU Student Union website backend.
paths:
  /api/v1/analytics/dashboard/:
    get:
      operationId: v1_analytics_dashboard_retrieve
      description: Aggregated statistics for the frontend Statistics and Reports dashboard.
      parameters:
      - in: query
        name: period
        schema:
          type: string
        description: 'Reporting period: last-8-months, academic-year, calendar-year'
      tags:
      - Core
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsDashboardResponse'
          description: ''
  /api/v1/analytics/reports/export/:
    get:
      operationId: v1_analytics_reports_export_retrieve
      description: Export analytics report as CSV for the selected period.
      parameters:
      - in: query
        name: format
        schema:
          type: string
      - in: query
        name: period
        schema:
          type: string
      tags:
      - Core
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: ''
  /api/v1/announcement-categories/:
    get:
      operationId: v1_announcement_categories_list
      description: |-
        API endpoint for announcement categories.
        Read access is public; write actions are restricted to admins.
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Announcements
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAnnouncementCategoryList'
          description: ''
    post:
      operationId: v1_announcement_categories_create
      description: |-
        API endpoint for announcement categories.
        Read access is public; write actions are restricted to admins.
      tags:
      - Announcements
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnouncementCategoryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AnnouncementCategoryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnnouncementCategoryRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
